# Auto-generated config file for Air live-reloading tool.
# See https://gowebly.org for more information.

root = "."
tmp_dir = "tmp"

[build]
pre_cmd = ["bun install", "bun run build"]
cmd = "go generate ./model && go tool templ generate && go build -o ./tmp/gowebly_gorilla ."
bin = "tmp/gowebly_gorilla"
include_ext = ["go", "templ", "html", "js", "ts", "css", "scss"]
exclude_dir = [".parcel-cache", "bin", "dist", "node_modules", "static", "tmp", "tests", "vendor"]
exclude_regex = ["_test\\.go", "_templ\\.go", "_enum\\.go"]
exclude_unchanged = false
follow_symlink = false
log = "build-errors-air.log"
poll = false
poll_interval = 500
delay = 2000
stop_on_error = true
send_interrupt = true
kill_delay = "2s"
rerun = false
rerun_delay = 500

[log]
time = true
main_only = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = true
keep_scroll = true

[proxy]
# Enable live-reloading on the browser.
enabled = true
proxy_port = 8090
app_port = 4000